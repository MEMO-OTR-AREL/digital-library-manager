<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="page-wrapper">

    <div class="top-logo">

        <div class="real-logo">

            <div class="logo-blue"></div>

            <div class="logo-green"></div>

        </div>

        <div class="logo-writing">

            <h1>Neh-Meh Kitap</h1>

            <p>DİJİTAL KÜTÜPHANE</p>

        </div>

    </div>

    <div class="auth-menu">

        <a href="/login">Giriş Yap</a>

        <a href="/register">Üye Ol</a>

    </div>

    <div class="login-box">

        <form method="POST">

            <input
                class="auth-input"
                type="text"
                name="username"
                placeholder="Kullanıcı Adı"
                required
            >

            <input
                class="auth-input"
                type="password"
                name="password"
                placeholder="Şifre"
                required
            >

            <div class="remember-row">

                <input type="checkbox">

                <span>Beni Hatırla</span>

            </div>

            <button type="submit">
                Giriş Yap
            </button>

        </form>

    </div>

</div>

</body>
</html>
