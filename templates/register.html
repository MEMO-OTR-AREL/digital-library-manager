<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="page-wrapper">

    <!-- LOGO -->

    <div class="top-logo">

        <div class="real-logo">

            <div class="logo-blue"></div>

            <div class="logo-green"></div>

        </div>

        <div class="logo-writing">

            <h1>Neh-Meh Library</h1>

            <p>DIGITAL LIBRARY</p>

        </div>

    </div>

    <!-- MENU -->

    <div class="auth-menu">

        <a href="/login">Login</a>

        <a href="/register">Register</a>

    </div>

    <!-- REGISTER BOX -->

    <div class="login-box">

        <span class="hero-badge">
            Create Account
        </span>

        <h2 class="login-title">
            Create New Account
        </h2>

        <p class="login-subtitle">
            Start building your digital library
            and manage your books easily.
        </p>

        <form method="POST">

            <input
                type="text"
                name="username"
                class="auth-input"
                placeholder="Username"
                required
            >

            <input
                type="email"
                name="email"
                class="auth-input"
                placeholder="E-mail"
                required
            >

            <input
                type="password"
                name="password"
                class="auth-input"
                placeholder="Password"
                required
            >

            <button type="submit">
                Register
            </button>

        </form>

    </div>

</div>

</body>
</html>
