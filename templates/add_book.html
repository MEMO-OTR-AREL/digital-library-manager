<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <title>Add Book</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="dashboard-wrapper">

    <div class="dashboard-navbar">

        <div class="dashboard-logo">

            <div class="mini-logo">

                <div class="mini-blue"></div>

                <div class="mini-green"></div>

            </div>

            <span>
                Neh-Meh Kitap
            </span>

        </div>

        <div class="dashboard-links">

            <a href="/dashboard">Dashboard</a>

            <a href="/add_book">Add Book</a>

            <a href="/books">My Books</a>

            <a href="/logout">Logout</a>

        </div>

    </div>

    <div class="form-card">

        <h1>
            Yeni Kitap Ekle
        </h1>

        <form method="POST">

            <input
                type="text"
                name="title"
                class="auth-input"
                placeholder="Kitap Adı"
                required
            >

            <input
                type="text"
                name="author"
                class="auth-input"
                placeholder="Yazar"
                required
            >

            <input
                type="text"
                name="category"
                class="auth-input"
                placeholder="Kategori"
            >

            <select
                name="status"
                class="auth-input"
            >
                <option value="Reading">
                    Reading
                </option>

                <option value="Completed">
                    Completed
                </option>

                <option value="Planned">
                    Planned
                </option>
            </select>

            <input
                type="number"
                name="rating"
                class="auth-input"
                placeholder="Puan (1-10)"
                min="1"
                max="10"
            >

            <input
                type="number"
                name="progress"
                class="auth-input"
                placeholder="İlerleme %"
                min="0"
                max="100"
            >

            <button type="submit">
                Kitabı Ekle
            </button>

        </form>

    </div>

</div>

</body>
</html>
