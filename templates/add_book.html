<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Add Book</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="dashboard-wrapper">

    <!-- NAVBAR -->

    <div class="dashboard-navbar">

        <div class="dashboard-logo">

            <div class="mini-logo">

                <div class="mini-blue"></div>

                <div class="mini-green"></div>

            </div>

            <span>
                Neh-Meh Library
            </span>

        </div>

        <div class="dashboard-links">

            <a href="/dashboard">Dashboard</a>

            <a href="/add_book">Add Book</a>

            <a href="/books">My Books</a>

            <a href="/logout">Logout</a>

        </div>

    </div>

    <!-- PAGE -->

    <div class="addbook-container">

        <div class="addbook-header">

            <h1>Add New Book</h1>

            <p>
                Add a new book to your digital library
                and track your reading progress.
            </p>

        </div>

        <div class="addbook-card">

            <form method="POST">

                <div class="form-grid">

                    <!-- TITLE -->

                    <input
                        type="text"
                        name="title"
                        placeholder="Book Title"
                        class="auth-input"
                        required
                    >

                    <!-- AUTHOR -->

                    <input
                        type="text"
                        name="author"
                        placeholder="Author"
                        class="auth-input"
                        required
                    >

                    <!-- CATEGORY -->

                    <input
                        type="text"
                        name="category"
                        placeholder="Category"
                        class="auth-input"
                    >

                    <!-- STATUS -->

                    <select
                        name="status"
                        class="auth-input"
                    >

                        <option value="Reading">
                            Reading
                        </option>

                        <option value="Completed">
                            Completed
                        </option>

                        <option value="Planned">
                            Planned
                        </option>

                    </select>

                    <!-- RATING -->

                    <input
                        type="number"
                        name="rating"
                        placeholder="Rating (1-10)"
                        class="auth-input"
                        min="1"
                        max="10"
                    >

                    <!-- PROGRESS -->

                    <input
                        type="number"
                        name="progress"
                        placeholder="Progress %"
                        class="auth-input"
                        min="0"
                        max="100"
                    >

                </div>

                <button
                    type="submit"
                    class="big-add-btn"
                >
                    Add Book
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
