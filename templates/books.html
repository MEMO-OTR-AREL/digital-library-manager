<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <title>My Books</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="dashboard-wrapper">

    <div class="dashboard-navbar">

        <div class="dashboard-logo">

            <div class="mini-logo">

                <div class="mini-blue"></div>

                <div class="mini-green"></div>

            </div>

            <span>
                Neh-Meh Kitap
            </span>

        </div>

        <div class="dashboard-links">

            <a href="/dashboard">Dashboard</a>

            <a href="/add_book">Add Book</a>

            <a href="/books">My Books</a>

            <a href="/logout">Logout</a>

        </div>

    </div>

    <div class="books-header">

        <h1>
            Kitaplarım
        </h1>

        <form method="GET" class="search-form">

            <input
                type="text"
                name="search"
                placeholder="Kitap ara..."
                class="search-input"
            >

            <select
                name="category"
                class="search-select"
            >

                <option value="">
                    Tüm Kategoriler
                </option>

                <option value="Programming">
                    Programming
                </option>

                <option value="Roman">
                    Roman
                </option>

                <option value="Classic">
                    Classic
                </option>

            </select>

            <button type="submit">
                Ara
            </button>

        </form>

    </div>

    <div class="books-grid">

        {% for book in books %}

        <div class="book-modern-card">

            <div class="book-top">

                <h2>
                    {{ book[2] }}

                    {% if book[8] == 1 %}
                        ⭐
                    {% endif %}
                </h2>

                <span class="book-rating">
                    {{ book[6] }}/10
                </span>

            </div>

            <div class="book-info">

                <p>
                    <b>Yazar:</b> {{ book[3] }}
                </p>

                <p>
                    <b>Kategori:</b> {{ book[4] }}
                </p>

                <p>
                    <b>Durum:</b> {{ book[5] }}
                </p>

                <p>
                    <b>İlerleme:</b> {{ book[7] }}%
                </p>

            </div>

            <div class="book-actions">

                <a href="/edit_book/{{ book[0] }}">
                    Düzenle
                </a>

                <a href="/favorite_book/{{ book[0] }}">
                    Favori
                </a>

                <a href="/delete_book/{{ book[0] }}"
                   class="delete-btn">
                    Sil
                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
