<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Books</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h1>My Books</h1>

<a href="/dashboard">Dashboard</a>

{% for book in books %}

<div class="book-card">

    <h2>{{ book[2] }}</h2>

    <p><b>Author:</b> {{ book[3] }}</p>
    <p><b>Category:</b> {{ book[4] }}</p>
    <p><b>Status:</b> {{ book[5] }}</p>
    <p><b>Rating:</b> {{ book[6] }}</p>

    <a href="/delete_book/{{ book[0] }}">Delete</a>

    <br><br>

    <a href="/edit_book/{{ book[0] }}">Edit</a>

</div>

{% endfor %}

</body>
</html>
